server {
  listen      80;
  server_name _;

  root        /usr/share/nginx/html;
  index       index.html;

  # Compression — handled by Dokploy's edge proxy too, but harmless.
  gzip                on;
  gzip_vary           on;
  gzip_min_length     1024;
  gzip_proxied        any;
  gzip_comp_level     6;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/manifest+json
    application/xml
    image/svg+xml
    font/woff2;

  # Long-lived, content-hashed assets.
  location /assets/ {
    expires    1y;
    add_header Cache-Control "public, immutable";
    try_files  $uri =404;
  }

  # Service worker MUST NOT be cached, otherwise users get stuck on old builds.
  location = /sw.js              { add_header Cache-Control "no-cache"; }
  location = /registerSW.js      { add_header Cache-Control "no-cache"; }
  location = /manifest.webmanifest { add_header Cache-Control "no-cache"; }
  location = /index.html         { add_header Cache-Control "no-cache"; }

  # Sync server — WebSocket upgrade
  location /ws {
    proxy_pass         http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host $host;
    proxy_read_timeout 86400;
  }

  # Sync server — HTTP API
  location /api/ {
    proxy_pass         http://127.0.0.1:3001;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
  }

  # SPA fallback — every unknown path serves index.html so the client router
  # can take over.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Drop noisy errors for missing favicons / robots.
  location = /favicon.ico { log_not_found off; access_log off; }
  location = /robots.txt  { log_not_found off; access_log off; }
}
