server {
  listen      80;
  server_name _;

  root        /usr/share/nginx/html;
  index       index.html;

  # ── Security headers ───────────────────────────────────────────────────
  # CSP: block XSS by restricting script/style/connect sources.
  # 'unsafe-inline' for styles is needed for React inline styles.
  # connect-src allows WebSocket (wss:, ws:) and HTTPS for S3/Facebook APIs.
  add_header Content-Security-Policy
    "default-src 'self'; script-src 'self' https://connect.facebook.net; style-src 'self' 'unsafe-inline'; img-src 'self' blob: data: https://*.fbcdn.net https://*.facebook.com; media-src 'self' blob:; connect-src 'self' ws: wss: https://*.amazonaws.com https://graph.facebook.com https://www.facebook.com; font-src 'self'; frame-src https://www.facebook.com https://web.facebook.com; object-src 'none'; base-uri 'self'; form-action 'self';"
    always;

  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options  "nosniff"                          always;
  add_header X-Frame-Options         "DENY"                             always;
  add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;
  add_header Permissions-Policy      "camera=(), microphone=(), geolocation=(), payment=()" always;

  # Compression — handled by Dokploy's edge proxy too, but harmless.
  gzip                on;
  gzip_vary           on;
  gzip_min_length     1024;
  gzip_proxied        any;
  gzip_comp_level     6;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/manifest+json
    application/xml
    image/svg+xml
    font/woff2;

  # Long-lived, content-hashed assets.
  location /assets/ {
    expires    1y;
    add_header Cache-Control "public, immutable";
    try_files  $uri =404;
  }

  # Service worker MUST NOT be cached, otherwise users get stuck on old builds.
  location = /sw.js              { add_header Cache-Control "no-cache"; }
  location = /registerSW.js      { add_header Cache-Control "no-cache"; }
  location = /manifest.webmanifest { add_header Cache-Control "no-cache"; }
  location = /index.html         { add_header Cache-Control "no-cache"; }

  # Sync server — WebSocket upgrade (rate-limited server-side)
  location /ws {
    proxy_pass         http://127.0.0.1:3001;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 86400;
  }

  # Sync server — HTTP API (rate-limited server-side)
  location /api/ {
    proxy_pass         http://127.0.0.1:3001;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # SPA fallback — every unknown path serves index.html so the client router
  # can take over.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Drop noisy errors for missing favicons / robots.
  location = /favicon.ico { log_not_found off; access_log off; }
  location = /robots.txt  { log_not_found off; access_log off; }
}
